<app-header />
<!-- <app-user></app-user> -->
<main>
  <ul id="users">
    @for (user of users; track user.id) {
      <li>
        <app-user [user]="user" (custSelect)="onSelectUser($event)" />
      </li>
    }
  </ul>

  @if (userObject) {
    <app-tasks [userObj]="userObject"></app-tasks>
  } @else {
    <p>Please select a user</p>
  }
</main>
